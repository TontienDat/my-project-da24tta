<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Thông Tin cá nhân</title>

    <!-- Liên kết CSS -->
    <link rel="stylesheet" href="../css/style2.css">
</head>
<body>
<div class="container">
        <h3 id="title">Đăng nhập hệ thống</h3>

        <div class="form-group">
            <label for="txtUsername">Tên đăng nhập:</label>
            <input class="form-control" type="text" id="txtUsername" name="txtUsername" required>
        </div>

        <div class="form-group">
            <label for="txtPassword">Mật khẩu:</label>
            <input class="form-control" type="password" id="txtPassword" name="txtPassword" required>
        </div>

        <input class="button" type="submit" id="sbLogin" value="Đăng Nhập">
        <input class="button" type="reset" id="rsCancel" value="Đăng ký"> 
    </form>
</div>
</body>
</html>
