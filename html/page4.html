<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Thanh Toán Hóa Đơn</title>
    <link rel="stylesheet" href="../css/style4.css">
</head>
<body>

<div class="invoice">
    <h2>BẢNG THANH TOÁN HÓA ĐƠN</h2>
    
    <table border="1">
        <thead>
            <tr>
                <th>STT</th>
                <th>Tên sản phẩm</th>
                <th>Số lượng</th>
                <th>Đơn giá (VND)</th>
                <th>Thành tiền (VND)</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>A</td>
                <td class="sl">3</td>
                <td class="dg">1000</td>
                <td class="tt">0</td>
            </tr>
            <tr>
                <td>2</td>
                <td>B</td>
                <td class="sl">4</td>
                <td class="dg">2000</td>
                <td class="tt">0</td>
            </tr>
            <tr>
                <td>3</td>
                <td>C</td>
                <td class="sl">5</td>
                <td class="dg">4000</td>
                <td class="tt">0</td>
            </tr>
            <tr>
                <td>4</td>
                <td>D</td>
                <td class="sl">2</td>
                <td class="dg">5000</td>
                <td class="tt">0</td>
            </tr>
        </tbody>

        <tr>
            <td colspan="4"><b>Tổng cộng</b></td>
            <td id="tong">0</td>
        </tr>

    </table>
</div>

<script>
function tinhTien(){
    var sl = document.getElementsByClassName("sl");
    var dg = document.getElementsByClassName("dg");
    var tt = document.getElementsByClassName("tt");

    var tong = 0;
    
    for(let i = 0; i < sl.length; i++){
        var soluong = parseInt(sl[i].innerText);
        var dongia = parseInt(dg[i].innerText);

        var thanhTien = soluong * dongia;
        tt[i].innerText = thanhTien;

        tong += thanhTien;
    }

    document.getElementById("tong").innerText = tong;
}

// Tự chạy khi load trang
window.onload = tinhTien;
</script>

</body>
</html>
